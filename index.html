<script>const FOLDERS=["Dream, Ivory","welcome and goodbye","i luv u.","505", "The Night We Met"];(()=>{const c=document.getElementById('snow'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;window.onresize=()=>{c.width=innerWidth;c.height=innerHeight};const f=Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.5,sp:Math.random()*0.8+0.3,dx:Math.random()*0.4-0.2}));(function d(){x.clearRect(0,0,c.width,c.height);x.fillStyle='rgba(255,255,255,0.7)';f.forEach(k=>{x.beginPath();x.arc(k.x,k.y,k.r,0,Math.PI*2);x.fill();k.y+=k.sp;k.x+=k.dx;if(k.y>c.height){k.y=0;k.x=Math.random()*c.width}if(k.x>c.width)k.x=0;if(k.x<0)k.x=c.width});requestAnimationFrame(d)})()})();customElements.define('gh-logo',class extends HTMLElement{connectedCallback(){const s=+(this.getAttribute('size')||16);this.style.display='inline-flex';this.innerHTML=`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>`}attributeChangedCallback(){this.connectedCallback()}static get observedAttributes(){return['size']}});const sh=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b};const pl=sh(FOLDERS.map(n=>({title:n,src:`music/${n}/music
